name: Build TVM Wheel
description: >
  Build and test the LLVM-enabled TVM wheel for a given OS/architecture
  combination using cibuildwheel.

inputs:
  arch:
    description: "Target architecture for cibuildwheel (e.g., x86_64, aarch64, arm64, AMD64)"
    required: true
  build:
    description: "cibuildwheel build selector (e.g., cp310-manylinux_x86_64)"
    required: true
  distribution_name:
    description: "Optional wheel distribution name override, useful for TestPyPI"
    required: false
    default: ""
  distribution_version:
    description: "Optional wheel distribution version override, useful for TestPyPI"
    required: false
    default: ""
  include_cuda_runtime:
    description: "Set to 1 to build and inject the CUDA runtime library (Linux only)"
    required: false
    default: "0"

runs:
  using: "composite"
  steps:
    - uses: ./.github/actions/detect-env-vars
      id: env_vars

    # Single source of truth for the LLVM toolchain version, shared by the cache
    # key and the conda install steps below.
    - name: Set LLVM version
      shell: bash
      run: echo "LLVM_VERSION=22.1.0" >> "$GITHUB_ENV"

    - name: Prepare LLVM cache path (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        set -eux
        sudo mkdir -p /opt/llvm
        sudo chown -R "$(whoami)" /opt/llvm

    # ---- Cache LLVM prefix ----
    - name: Cache LLVM
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      id: llvm-cache
      with:
        path: ${{ runner.os == 'Windows' && 'C:/opt/llvm' || '/opt/llvm' }}
        key: tvm-wheel-llvm-${{ env.LLVM_VERSION }}-${{ runner.os }}-${{ inputs.arch }}-v5

    # ---- Install LLVM via conda (cache miss only) ----
    - name: Setup conda
      if: steps.llvm-cache.outputs.cache-hit != 'true'
      uses: conda-incubator/setup-miniconda@8ee1f361103df19b6f8c8655fd3967a8ecb162d5 # v4.0.1
      continue-on-error: true
      id: conda1
      with:
        miniforge-version: latest
        conda-remove-defaults: true

    - name: Setup conda (retry with tar.bz2)
      if: steps.llvm-cache.outputs.cache-hit != 'true' && steps.conda1.outcome == 'failure'
      uses: conda-incubator/setup-miniconda@8ee1f361103df19b6f8c8655fd3967a8ecb162d5 # v4.0.1
      with:
        miniforge-version: latest
        use-only-tar-bz2: true
        conda-remove-defaults: true

    - name: Install LLVM (Unix)
      if: steps.llvm-cache.outputs.cache-hit != 'true' && runner.os != 'Windows'
      shell: bash -l {0}
      run: |
        set -eux
        if [[ "${RUNNER_OS}" == "Linux" ]]; then
          sudo mkdir -p /opt/llvm
          sudo chown -R "$(whoami)" /opt/llvm
        fi
        conda create -q -p /opt/llvm -c conda-forge \
          "llvmdev=${LLVM_VERSION}" "clangdev=${LLVM_VERSION}" "compiler-rt=${LLVM_VERSION}" zlib zstd-static libxml2-devel \
          -y

    - name: Install LLVM (Windows)
      if: steps.llvm-cache.outputs.cache-hit != 'true' && runner.os == 'Windows'
      shell: cmd /C call {0}
      run: |
        conda create -q -p C:\opt\llvm -c conda-forge llvmdev=%LLVM_VERSION% zlib zstd-static libxml2-devel -y
        rem Force static zstd. conda zstd-static also pulls in dynamic zstd, and
        rem FindLLVM.cmake links %libdir%\zstd.lib for llvm-config's "zstd.dll.lib"
        rem token; overwrite that import lib with the static archive and drop the
        rem DLL so the build links zstd statically (no vendored zstd-*.dll).
        copy /Y C:\opt\llvm\Library\lib\zstd_static.lib C:\opt\llvm\Library\lib\zstd.lib
        del /Q C:\opt\llvm\Library\bin\zstd.dll C:\opt\llvm\Library\bin\libzstd.dll

    # Inject the absolute path to the Windows CUDA sidecar into CIBW_ENVIRONMENT.
    # The {project} placeholder is not expanded inside CIBW_ENVIRONMENT values, so
    # compute the forward-slash host path here (the Windows analog of the Linux
    # /project hardcode). before-all writes the DLL under build-wheel-cuda/lib/.
    - name: Compute CUDA sidecar path (Windows)
      if: runner.os == 'Windows' && inputs.include_cuda_runtime == '1'
      shell: bash
      run: echo "TVM_CUDA_EXTRA_LIB=$(cygpath -m "$(pwd)")/build-wheel-cuda/lib/tvm_runtime_cuda.dll" >> "$GITHUB_ENV"

    # ---- Build and test wheels ----
    - name: Build and test wheels
      uses: pypa/cibuildwheel@298ed2fb2c105540f5ed055e8a6ad78d82dd3a7e # v3.3.1
      with:
        package-dir: .
        output-dir: wheelhouse
      env:
        CIBW_BUILD: ${{ inputs.build }}
        CIBW_ARCHS_LINUX: ${{ inputs.arch }}
        CIBW_ARCHS_MACOS: ${{ inputs.arch }}
        CIBW_ARCHS_WINDOWS: ${{ inputs.arch }}
        CMAKE_BUILD_PARALLEL_LEVEL: ${{ steps.env_vars.outputs.cpu_count }}
        # Linux builds run in cibuildwheel's default manylinux_2_28 container;
        # bind-mount the cached LLVM prefix into it. Ignored on macOS/Windows,
        # which build without a container.
        CIBW_CONTAINER_ENGINE: "docker; create_args: --volume /opt/llvm:/opt/llvm:ro"
        # Build the CUDA runtime sidecar once per architecture inside the
        # manylinux build container (no-op for CPU-only wheels). The CPU wheel
        # build then bundles the resulting libtvm_runtime_cuda.so via
        # -DTVM_PACKAGE_EXTRA_LIBS. Replaces the separate build-cuda docker job.
        CIBW_BEFORE_ALL_LINUX: >-
          bash {project}/ci/scripts/package/manylinux_build_libtvm_runtime_cuda.sh
          "${{ inputs.include_cuda_runtime }}"
        # Windows mirror of the Linux hook: build tvm_runtime_cuda.dll on the host
        # (there is no build container on Windows). cibuildwheel runs before-all
        # through bash on Windows too, so the same bash entrypoint shape works.
        CIBW_BEFORE_ALL_WINDOWS: >-
          bash {project}/ci/scripts/package/windows_build_libtvm_runtime_cuda.sh
          "${{ inputs.include_cuda_runtime }}"
        CIBW_ENVIRONMENT: >-
          TVM_USE_LLVM="/opt/llvm/bin/llvm-config --link-static"
          CMAKE_PREFIX_PATH="/opt/llvm"
          CMAKE_ARGS="-DUSE_LLVM='/opt/llvm/bin/llvm-config --link-static' -DCMAKE_PREFIX_PATH=/opt/llvm ${{ inputs.include_cuda_runtime == '1' && '-DTVM_PACKAGE_EXTRA_LIBS=/project/build-wheel-cuda/lib/libtvm_runtime_cuda.so' || '' }}"
          TVM_WHEEL_DIST_NAME="${{ inputs.distribution_name }}"
          TVM_WHEEL_DIST_VERSION="${{ inputs.distribution_version }}"
          TVM_BUILD_PARALLEL_LEVEL="${{ steps.env_vars.outputs.cpu_count }}"
        CIBW_ENVIRONMENT_WINDOWS: >-
          TVM_USE_LLVM="C:/opt/llvm/Library/bin/llvm-config.exe --link-static"
          CMAKE_PREFIX_PATH="C:/opt/llvm/Library"
          CMAKE_ARGS="-DUSE_LLVM='C:/opt/llvm/Library/bin/llvm-config.exe --link-static' -DCMAKE_PREFIX_PATH=C:/opt/llvm/Library ${{ inputs.include_cuda_runtime == '1' && format('-DTVM_PACKAGE_EXTRA_LIBS={0}', env.TVM_CUDA_EXTRA_LIB) || '' }}"
          TVM_WHEEL_DIST_NAME="${{ inputs.distribution_name }}"
          TVM_WHEEL_DIST_VERSION="${{ inputs.distribution_version }}"
          TVM_BUILD_PARALLEL_LEVEL="${{ steps.env_vars.outputs.cpu_count }}"
        # Strict post-install expectations consumed by tests/python/wheel. These
        # belong to the cibuildwheel test phase, so the standard test-command
        # asserts them (no separate verify step needed).
        CIBW_TEST_ENVIRONMENT: >-
          TVM_EXPECT_LLVM_ENABLED=1
          TVM_EXPECT_STATIC_LLVM=1
          TVM_EXPECT_CUDA_RUNTIME="${{ inputs.include_cuda_runtime }}"
          TVM_EXPECT_CUDA_ENABLED="${{ inputs.include_cuda_runtime != '1' && '0' || '' }}"

content:
  details: "maps.py (CUDA 54 lines, TRN 64 lines) was a pure routing layer that called\n\
    register_unary_binary_schedule() to bind op names to schedule candidates from unary.py\n\
    and binary.py. It contained zero unique logic \u2014 every schedule implementation lived in\n\
    the target modules already.\n\nDecision: delete maps.py and move the registration calls\
    \ to the bottom of unary.py and\nbinary.py respectively. This reduces indirection without\
    \ changing any runtime behavior.\n\nMapOpType enum was kept as-is (not renamed to ElementwiseOpType)\
    \ to minimize diff size.\nIt remains used in 60+ places as the op table key and can be\
    \ renamed in a follow-up.\n\nTest files were split accordingly: test_maps.py \u2192 test_unary.py\
    \ + test_binary.py,\nand test_maps_trn.py \u2192 test_unary_trn.py + test_binary_trn.py.\
    \ Cast tests were\ngrouped with unary since cast is a unary operation.\n"
  summary: Eliminated the maps.py pure-dispatcher module by inlining its registration
    calls directly into unary.py and binary.py for both CUDA and TRN targets.

content:
  summary: Use a parser fallback that supports both `is_tirx` and legacy `is_tirp` when entering
    `T.prim_func`.
  details: After rebasing onto newer upstream parser behavior, mixed code paths referenced different
    `T.prim_func` keyword names. The chosen design is to keep parser behavior backward-compatible
    by first calling `T.prim_func(is_tirx=...)` and, on `TypeError`, falling back to `T.prim_func(is_tirp=...)`.
    This localizes migration handling, preserves existing semantics, and avoids broader edits in
    large IRBuilder modules during stabilization.
created: '2026-02-28'
id: ADR-20260228-0002
scope:
  - repo
tags:
  - tvmscript
  - parser
  - compatibility
  - api-evolution
  - rebase
title: Adopt parser-level fallback for `T.prim_func` keyword migration
updated: '2026-02-28'

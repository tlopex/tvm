content:
  details: >-
    For this warning-cleanup feature, we decided not to rely on persistent global suppression in
    test config. Repository-controlled warnings were fixed in code paths under `python/tvm/...`,
    while warnings emitted by external components (SWIG runtime, vendored CUTLASS examples, and
    installed CUTLASS DSL package) were kept visible and documented. This preserves signal for
    dependency/runtime changes and avoids hiding third-party behavior behind repository-wide
    filters.
  summary: >-
    The feature adopted code-level fixes only and intentionally left external warning sources
    unfiltered.
created: '2026-03-06'
id: ADR-20260306-195314-450625
scope:
  - repo
tags:
  - pytest
  - warnings
  - testing
  - third-party
  - policy
title: Use code-level warning remediation and keep third-party warnings visible
updated: '2026-03-06'

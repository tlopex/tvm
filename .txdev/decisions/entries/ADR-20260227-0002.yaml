content:
  details: 'test_copy_tma_3d_with_view tests the interaction between buffer.view() and TMA copy dispatch.

    The view operation (Q_smem.view(2, 2, 32, 4, 64)) happens in the TVMScript IR builder,

    producing a buffer with specific layout/strides that copy_tma_impl then processes.


    This cannot be reproduced by _make_tma_call which constructs buffers from scratch — the

    view-derived layout depends on the full IR builder pipeline. Therefore this test stays as

    a standalone end-to-end GPU test in Section 3, separate from the parametrized unit tests.


    Similarly, test_copy_tma_symbolic_dimension uses symbolic Var dimensions which require

    the full TVMScript → LowerTIRx pipeline and cannot be unit-tested via _make_tma_call.

    '
  summary: Buffer view + TMA tests cannot be merged into parametrized unit tests because view semantics are resolved at the
    IR builder level, not at copy_tma_impl level.
created: '2026-02-27'

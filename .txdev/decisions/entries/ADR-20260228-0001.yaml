content:
  details: After syncing `.pre-commit-config.yaml` with `apache/main`, the branch accepted stricter hook
    behavior and fixed resulting blockers in the changed scope (header and formatting/lint issues) so
    commits pass without bypass. This keeps local behavior consistent with upstream expectations and reduces
    CI surprises after merge.
  summary: The feature aligned to upstream hook policy and resolved local violations rather than weakening
    enforcement.
created: '2026-02-28'
id: ADR-20260228-0001
scope:
  - repo
tags:
  - pre-commit
  - upstream-alignment
  - tooling
  - ci
title: Adopt upstream pre-commit policy and fix local blockers instead of relaxing checks
updated: '2026-02-28'

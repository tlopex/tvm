content:
  summary: >-
    For conflicted kernel tests, take upstream implementations first, then apply minimal
    non-semantic lint fixes.
  details: >-
    In this feature, kernel-heavy test conflicts were resolved by first accepting upstream
    `origin/tirx` implementations wholesale, then making the smallest possible lint/style edits
    needed for pre-commit. This decision minimized semantic divergence from upstream, reduced
    debugging complexity, and improved confidence that test behavior remained correct while meeting
    formatting policy.
created: '2026-03-01'
id: ADR-20260301-0001
scope:
  - repo
tags:
  - rebase
  - kernel
  - upstream-alignment
  - pre-commit
  - testing
title: Prefer upstream-first conflict resolution for kernel test files
updated: '2026-03-01'

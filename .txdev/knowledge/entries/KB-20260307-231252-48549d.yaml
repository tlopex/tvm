content:
  details: "When allocating shared memory buffers (Tx.alloc_buffer with scope=\"shared\"),\
    \ the buffer\ncontents are undefined \u2014 they contain residual data from prior kernel\
    \ or warp executions.\n\nIn cross-dtype (out-of-place) unary tests, B_smem was allocated\
    \ at full buffer size but\nonly a subregion (map_slice_res) was written by the unary op.\
    \ The copy-back used the full\nbuffer slice (copy_slice), reading uninitialized smem regions.\
    \ This passed when running\ntests in isolation (GPU idle, smem likely zeroed) but failed\
    \ under parallel execution\n(-n 16) because smem was reused across concurrent kernels.\n\
    \nFix pattern: always copy back only the written subregion, not the full buffer.\nDiagnostic\
    \ clue: tests pass in isolation but fail in batch \u2192 suspect uninitialized memory.\n"
  summary: GPU shared memory (smem) is never auto-zeroed; it retains garbage from
    previous kernel executions, causing flaky test failures when unwritten regions
    are read back.

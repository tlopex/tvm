content:
  details: "tma_shared_layout(dtype, swizzle_len, shape) returns different layout types:\n- ComposeLayout(SwizzleLayout, TileLayout)\
    \ for shapes where swizzle applies to sub-dimensions\n  e.g., tma_shared_layout(\"float16\", 3, (8, 256)) or (3, 64, 256)\n\
    - SwizzleLayout alone for shapes that match the swizzle granularity exactly\n  e.g., tma_shared_layout(\"float16\", 3,\
    \ (128, 64))\n- TileLayout for swizzle_len=0\n  e.g., tma_shared_layout(\"float16\", 0, (8, 256))\n\nThe to_tile_layout()\
    \ function in copy_async.py handles all three cases.\nWhen building expected IR, mirror this logic exactly.\n"
  summary: tma_shared_layout() returns ComposeLayout, SwizzleLayout, or TileLayout depending on shape and swizzle_len — always
    check isinstance before accessing .tile_layout.
created: '2026-02-27'

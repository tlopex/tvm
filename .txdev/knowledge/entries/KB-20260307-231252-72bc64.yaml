content:
  details: "The op_schedule dispatcher uses a registration pattern where schedule candidates\
    \ are\nregistered at module import time via calls to register_unary_binary_schedule()\
    \ at the\nbottom of each module (unary.py, binary.py). The __init__.py files import these\
    \ modules\nsolely to trigger these registrations.\n\nWhen refactoring (e.g., removing\
    \ a dispatcher layer like maps.py), the key is to ensure\nthe registration calls are moved\
    \ to the correct module and that __init__.py still imports\nthem. The actual `import *`\
    \ exports nothing meaningful \u2014 it's purely for side effects.\n"
  summary: Op schedule __init__.py uses `from .module import *` purely to trigger
    module-level registration side effects, not to re-export symbols.

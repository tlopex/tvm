content:
  details: 'When using `from .module import (name_a as _name_a, name_b as _name_b)`,

    ruff''s import sorting rule (I001 / isort compatibility) will split each

    aliased import into its own `from .module import (name as _name,)` block.

    This makes the import section unnecessarily verbose and hard to read.


    The fix is to avoid `as` aliases entirely: import with the public name and

    update all call sites. If the original names had underscore prefixes because

    they were private in their original module, removing the prefix is correct

    after extracting them to a dedicated utility module where they become public API.


    Encountered during layout_utils.py extraction: cast.py, unary.py, binary.py

    all imported 5 functions with `as _name` aliases, producing 15 separate

    import statements after ruff auto-fix. Removing aliases consolidated to

    one clean import block per file.

    '
  summary: Ruff's import sorter (I001) splits `from X import (a as _a, b as _b)` into
    separate `from X import (a as _a,)` statements; avoid `as` aliases to keep imports
    grouped.

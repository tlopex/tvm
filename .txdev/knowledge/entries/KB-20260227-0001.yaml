content:
  details: "TVMScript round-trip does NOT work for testing copy_tma_impl output because:\n(a) host_init LetStmt has free variables\
    \ that can't be parsed as standalone PrimFunc\n(b) parser adds extra default args to g2c call that copy_tma_impl doesn't\
    \ include\n(c) DeclBuffer with external data pointer fails VerifyWellFormed\n\nWorking approach: construct expected IR\
    \ programmatically using TIR node constructors,\nthen use tvm.ir.assert_structural_equal(actual, expected, map_free_vars=True).\n\
    map_free_vars=True is essential because Var objects (mbar_ptr, A_tensormap) differ\nbetween independent constructions.\n\
    \nKey type details:\n- A_tensormap type: PointerType(TensorMapType(), \"global\") — from tvm.ir.type\n- PTX call dtype:\
    \ \"\" (empty string) for g2c/s2g, \"int32\" for tvm_call_packed\n- Layout stripping mirrors to_tile_layout() in copy_async.py:\n\
    \  ComposeLayout -> .tile_layout, SwizzleLayout -> TileLayout(S[shape]), TileLayout -> as-is\n"
  summary: Use tvm.tir constructors (PrimFunc, For, DeclBuffer, Call, LetStmt) with assert_structural_equal(map_free_vars=True)
    for golden IR comparison when TVMScript round-trip fails.

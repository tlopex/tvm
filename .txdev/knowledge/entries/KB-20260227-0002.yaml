content:
  details: "The PTX intrinsic call arguments for TMA operations:\n\nptx_cp_async_bulk_tensor_global_to_cluster (g2c):\n  args\
    \ = [dim, dst_ptr, mbar_ptr, tensormap, *coords, cta_mask, cta_group, cache_hint]\n  where len(coords) == dim, cta_mask\
    \ is typically 0, cta_group is 1 or 2\n\nptx_cp_async_bulk_tensor_shared_to_global (s2g):\n  args = [dim, src_ptr, tensormap,\
    \ *coords, cache_hint]\n  where len(coords) == dim\n\ndim (tma_rank) is NOT the tensor ndim — it's len(box_dim) from the\
    \ TMA decomposition.\nFor swizzle_len>=1 2D tensors, tma_rank is typically ndim+1 due to shard decomposition.\nFor swizzle_len=0,\
    \ tma_rank may equal the flattened dimension count.\n\nCoords can be non-zero when g_region has non-zero start offsets\
    \ (e.g., g_region=((64,88),(0,64))\nproduces coords=[0, 64]).\n"
  summary: 'g2c args: (dim, addr, mbar, tensormap, *coords, cta_mask, cta_group, cache_hint); s2g args: (dim, addr, tensormap,
    *coords, cache_hint). coords count must equal dim.'

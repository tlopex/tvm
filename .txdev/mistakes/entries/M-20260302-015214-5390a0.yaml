content:
  details: |-
    The tcgen05 UTCCP copy PR moved tma_shared_layout and SwizzleMode from copy_async.py to common.py but left 3 files still importing from the old path (test_gemm_async.py, test_layout.py, fp8_blockwise_gemm.py). This broke pytest collection for the tirx test suite.

    Prevention checklist for symbol moves:
    1. Before the move: grep -r 'from.*old_module import.*symbol' to find ALL import sites
    2. Update every site in the same commit/PR as the move
    3. Run pytest --collect-only on the full test suite to catch import-time failures
    4. If copy_async.py still needs the symbol internally, import it from common.py — but do NOT rely on transitive re-exports for external consumers
  summary: When moving symbols between modules, grep all import sites and update them in the same PR — missed sites cause
    ImportError at test collection time.

content:
  details: 'The user''s goal.md explicitly stated: "对于每个test，手工构造expected_impl和expected_create_tensor_map()，

    利用assert_structural_equal()判断生成的和expected是否一样". Multiple attempts substituted TMA op

    counting (expected_tma_ops=1) instead of full structural equality, which the user rejected

    forcefully three times. The root cause was treating structural comparison as too hard and

    taking a shortcut. The fix was to invest time in programmatic TIR construction to build

    expected IR nodes and use assert_structural_equal(map_free_vars=True).


    Lesson: read the requirements literally. If "assert_structural_equal" is specified, that''s

    what must be implemented, not an approximation.

    '
  summary: When the user specifies a verification method (assert_structural_equal), implement exactly that — do not substitute
    a weaker check (op counting) as a shortcut.

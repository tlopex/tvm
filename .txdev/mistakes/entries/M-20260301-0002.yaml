content:
  details: >-
    The tests were passing config={"mbar": mbar, "cta_group": 1} to Tx.copy(), which got
    double-wrapped because **kwargs already captures everything. Instead of fixing the 6 call sites
    in test files to use mbar=mbar, cta_group=1 (the correct usage), a config named parameter was
    added to copy() and copy_async() in tirx.py to intercept and unwrap the dict. The DSL API was
    already correct; the tests were using it wrong. The fix should have been at the call sites, not
    in the framework. Lesson: when there is a mismatch between API usage and API behavior, first
    check if the usage is wrong before modifying the API. Prefer fixing call sites over adding
    compatibility shims to framework code.
  summary: >-
    Added a config parameter to the tirx.py copy() DSL function to work around a test bug, instead
    of fixing the test call sites to use kwargs directly.

content:
  details: 'An intermediate approach serialized all 35 test cases'' expected IR into a 597KB JSON file

    (test_copy_async_golden.json) using tvm.ir.save_json/load_json. While functionally correct,

    the user rejected it: "不是谁让你用json加载的，而且你这个json有可读性吗".


    The working approach: a GOLDEN_PARAMS dict with readable numeric parameters inline in the

    test file (dim, loop_extents, coord_fn, encode_args). Each case is 2-3 lines of clear

    Python data. Builder functions construct the expected IR from these parameters.


    Lesson: golden test data should be human-readable and reviewable in the test file itself.

    If golden data requires a separate opaque file, the approach is wrong.

    '
  summary: Do not use serialized JSON blobs as golden test data — they are opaque and unreadable. Use inline, human-readable
    parameters instead.
created: '2026-02-27'
id: M-20260227-0002

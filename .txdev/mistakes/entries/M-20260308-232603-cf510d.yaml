content:
  details: 'During Phase 1.1, functions like `_get_local_region` were extracted from
    cast.py

    (where the underscore prefix made sense as module-private) into layout_utils.py

    (where they became public API). The import sites in unary.py, binary.py, and

    cast.py used `from .layout_utils import get_local_region as _get_local_region`

    to avoid renaming all call sites.


    This created two problems:

    1. ruff''s import sorter split each `as` alias into its own import block (5 functions
    × 3 files = 15 separate import statements)

    2. The underscore prefix was semantically wrong — these are now public functions
    in their own module


    The user noticed this and asked "why are these written this way, is there a special
    reason?"

    There was no good reason. The fix was to remove all aliases and use the public
    names directly.


    Lesson: When extracting functions to a new module, rename call sites to use

    the public names immediately. Don''t preserve internal naming conventions from

    the original location via import aliases.

    '
  summary: When moving functions from a private location (cast.py internals) to a
    public utility module (layout_utils.py), kept unnecessary underscore-prefix aliases
    at import sites, causing ruff to split them into ugly per-import blocks.

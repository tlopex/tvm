content:
  details: 'Initial GOLDEN_PARAMS had wrong values for:

    - dim (used ndim instead of tma_rank; actual dim = ndim + 1 due to shard decomposition)

    - coords (assumed all zeros, but some cases have non-zero coords from g_region offsets)

    - g2c arg structure (forgot cta_mask between coords and cta_group)

    - layout stripping (didn''t handle SwizzleLayout → identity TileLayout case)


    Each of these was caught only after running tests and reading error messages. A faster

    approach: write a diagnostic script that dumps the actual call args for all cases first,

    then use those values to populate GOLDEN_PARAMS. This was eventually done and immediately

    fixed all remaining issues.

    '
  summary: Always dump and inspect the actual IR output first before hardcoding expected values — don't guess parameters like
    dim, coords, or arg structure.
created: '2026-02-27'

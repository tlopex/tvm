content:
  details: >-
    The original PR added smem->tmem copy schedule registration in copy.py (for both "copy" and
    "copy_async" op names). But copy_async.py already had a registration for "copy_async" with
    variant="smem->tmem", creating a duplicate. The code was reviewed multiple times during rebase
    and test consolidation but the duplication was missed because the registrations were in different
    files (copy.py vs copy_async.py) and used slightly different function names but called the same
    underlying implementation. Lesson: when adding new dispatch registrations, grep for the op name
    + variant combination across ALL files in the op_schedule directory, not just the file being
    modified.
  summary: >-
    Did not notice that copy_async smem->tmem dispatch was registered in both copy.py and
    copy_async.py until the user pointed it out.

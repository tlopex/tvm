content:
  summary: >-
    File-level lint exemptions created risk and obscured real issues; targeted fixes were
    required.
  details: >-
    During pre-commit remediation, applying broad file-level ignores looked faster but conflicted
    with the requirement to preserve kernel correctness. The safer pattern is to fix each reported
    violation individually, keeping exemptions narrowly scoped (for this feature, only line-level
    E501 exceptions inside TVMScript when explicitly approved). This keeps behavior stable and
    makes regressions traceable.
created: '2026-03-01'
